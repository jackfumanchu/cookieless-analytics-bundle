cookieless_analytics:
    collect_prefix: '/ca'
    strip_query_params:
        - token
        - password
        - key
        - secret
        - email
    exclude_paths:
        - '^/admin'
        - '^/_'
    dashboard_enabled: true
    dashboard_prefix: '/analytics'
    dashboard_role: 'ROLE_ANALYTICS'
    dashboard_layout: ~
