parameters:
    env(DATABASE_URL): 'postgresql://catest:c4f3st@localhost/cookieless_analytics_test'

doctrine:
    dbal:
        url: '%env(DATABASE_URL)%'
        server_version: '18.3'
    orm:
        auto_mapping: true
        mappings:
            CookielessAnalyticsBundle:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/../../src/Entity'
                prefix: 'Jackfumanchu\CookielessAnalyticsBundle\Entity'
                alias: CookielessAnalytics
