doctrine:
    dbal:
        driver: pdo_pgsql
        #url: 'postgresql://postgres:postgres@localhost/cookieless_analytics_test'
        url: 'postgresql://catest:c4f3st@localhost/cookieless_analytics_test'
        # TEST_TOKEN is set by ParaTest/Infection for parallel processes
        dbname_suffix: '%env(default::TEST_TOKEN)%'
        server_version: '18.3'
    orm:
        auto_generate_proxy_classes: true

        auto_mapping: true
        mappings:
            CookielessAnalyticsBundle:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/../../src/Entity'
                prefix: 'Jackfumanchu\CookielessAnalyticsBundle\Entity'
                alias: CookielessAnalytics
