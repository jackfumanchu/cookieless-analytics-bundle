name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - run: composer update --no-progress

      - run: vendor/bin/phpunit --testsuite default --coverage-xml=coverage/coverage-xml --log-junit=coverage/junit.xml --coverage-clover=coverage/clover.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/cookieless_analytics_test

      - name: Mutation testing
        if: matrix.php == '8.4'
        run: vendor/bin/infection --threads=4 --no-progress --logger-github --coverage=coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/cookieless_analytics_test
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
          
      - name: Upload coverage to Codecov
        if: matrix.php == '8.4'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.4-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.4-

      - run: composer update --no-progress

      - run: vendor/bin/phpstan analyse

